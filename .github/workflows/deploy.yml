name: Deploy to Vercel

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  # Accept the token from either an Actions secret or an Actions variable.
  VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN || secrets.VERCEL || vars.VERCEL_TOKEN }}
  VERCEL_SCOPE: team_A7UzxmiDete44DbGVHO8kL28
  # DocChase's Vercel project — Supabase env vars are copied from it on
  # first deploy so PawSet talks to the same database it was built against.
  DOCCHASE_PROJECT_ID: prj_4T8N8pV6rxZXwFAefST0bqLkXuV7

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check VERCEL_TOKEN
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "::error::VERCEL_TOKEN secret is not set. Add it under Settings → Secrets and variables → Actions."
            exit 1
          fi

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull env vars from DocChase project
        run: |
          mkdir -p /tmp/docchase-env/.vercel
          cd /tmp/docchase-env
          printf '{"orgId":"%s","projectId":"%s"}\n' "$VERCEL_SCOPE" "$DOCCHASE_PROJECT_ID" > .vercel/project.json
          vercel env pull .env.production --environment=production --yes --token "$VERCEL_TOKEN" || true
          vercel env pull .env.preview --environment=preview --yes --token "$VERCEL_TOKEN" || true
          touch .env.production .env.preview

      - name: Check PawSet schema exists in Supabase
        run: |
          getvar() {
            grep -E "^$1=" /tmp/docchase-env/.env.production | head -1 | cut -d= -f2- | sed -e 's/^"//' -e 's/"$//'
          }
          url=$(getvar NEXT_PUBLIC_SUPABASE_URL)
          key=$(getvar NEXT_PUBLIC_SUPABASE_ANON_KEY)
          code=$(curl -s -o /tmp/schema-check.json -w '%{http_code}' \
            "$url/rest/v1/pets?select=id&limit=1" \
            -H "apikey: $key" -H "Authorization: Bearer $key")
          echo "HTTP $code"
          cat /tmp/schema-check.json || true
          if [ "$code" = "200" ]; then
            echo "::notice::pets table exists — PawSet schema is applied"
          else
            echo "::warning::pets table probe returned HTTP $code — PawSet schema may not be applied (run supabase/migrations/0001_schema.sql)"
          fi

      - name: Link PawSet project (created on first run)
        run: vercel link --yes --scope "$VERCEL_SCOPE" --project pawset --token "$VERCEL_TOKEN"

      - name: Copy Supabase env vars to PawSet project
        env:
          # Optional GitHub-secret fallbacks for values missing from DocChase.
          # Accept several likely secret names for the service-role key.
          GH_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY || secrets.PAWSET || secrets.SUPABASE_SERVICE_ROLE || secrets.SERVICE_ROLE_KEY || secrets.SUPABASE_KEY || secrets.SUPABASE_SECRET || secrets.SUPABASE }}
          GH_APP_SECRET: ${{ secrets.APP_SECRET }}
        run: |
          # Look for each var in DocChase production env, then preview env,
          # then a GitHub secret of the same name.
          copy_var() {
            name="$1"
            value=""
            for f in /tmp/docchase-env/.env.production /tmp/docchase-env/.env.preview; do
              value=$(grep -E "^${name}=" "$f" | head -1 | cut -d= -f2- | sed -e 's/^"//' -e 's/"$//')
              [ -n "$value" ] && break
            done
            if [ -z "$value" ]; then
              value=$(printenv "GH_${name}" || true)
            fi
            if [ -n "$value" ]; then
              printf '%s' "$value" | vercel env add "$name" production --force --token "$VERCEL_TOKEN" || true
            else
              echo "::warning::$name not found in DocChase env or GitHub secrets"
              return 1
            fi
          }
          copy_var NEXT_PUBLIC_SUPABASE_URL \
            || printf '%s' "https://jjgutfdwsjjqvksjqtup.supabase.co" | vercel env add NEXT_PUBLIC_SUPABASE_URL production --force --token "$VERCEL_TOKEN"
          copy_var NEXT_PUBLIC_SUPABASE_ANON_KEY || true
          copy_var SUPABASE_SERVICE_ROLE_KEY || true
          copy_var APP_SECRET || true

          # Verify the service-role key actually works against Supabase.
          if [ -n "$GH_SUPABASE_SERVICE_ROLE_KEY" ]; then
            url=$(grep -E '^NEXT_PUBLIC_SUPABASE_URL=' /tmp/docchase-env/.env.production | head -1 | cut -d= -f2- | sed -e 's/^"//' -e 's/"$//')
            code=$(curl -s -o /dev/null -w '%{http_code}' \
              "$url/rest/v1/pets?select=id&limit=1" \
              -H "apikey: $GH_SUPABASE_SERVICE_ROLE_KEY" \
              -H "Authorization: Bearer $GH_SUPABASE_SERVICE_ROLE_KEY")
            if [ "$code" = "200" ]; then
              echo "::notice::service-role key verified against Supabase"
            else
              echo "::warning::service-role key probe returned HTTP $code — the secret value may not be the service_role key"
            fi
          fi

      - name: Deploy to production
        run: |
          url=$(vercel deploy --prod --yes --token "$VERCEL_TOKEN")
          echo "PRODUCTION_URL=$url" >> "$GITHUB_ENV"
          {
            echo "## Production deployment"
            echo ""
            echo "$url"
          } >> "$GITHUB_STEP_SUMMARY"
          echo "Production URL: $url"

      - name: Set NEXT_PUBLIC_APP_URL for future builds
        run: |
          printf '%s' "$PRODUCTION_URL" | vercel env add NEXT_PUBLIC_APP_URL production --force --token "$VERCEL_TOKEN" || true
