name: End-to-end tests

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN || secrets.VERCEL }}
  VERCEL_SCOPE: team_A7UzxmiDete44DbGVHO8kL28
  PLAYWRIGHT_BROWSERS_PATH: /opt/pw-browsers

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Check VERCEL_TOKEN
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "::error::VERCEL_TOKEN secret is not set — needed to pull the app's env for the live-database E2E run."
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Pull PawSet production env from Vercel
        run: |
          npm i -g vercel@latest
          vercel link --yes --project pawset --scope "$VERCEL_SCOPE" --token "$VERCEL_TOKEN"
          vercel env pull .env.local --environment=production --yes --token "$VERCEL_TOKEN"

      - name: Export env for the test runner
        run: |
          while IFS= read -r line; do
            case "$line" in
              NEXT_PUBLIC_SUPABASE_URL=*|NEXT_PUBLIC_SUPABASE_ANON_KEY=*|SUPABASE_SERVICE_ROLE_KEY=*|APP_SECRET=*)
                k="${line%%=*}"; v="${line#*=}"; v="${v%\"}"; v="${v#\"}"
                echo "$k=$v" >> "$GITHUB_ENV" ;;
            esac
          done < .env.local
          # Force demo mode so the journey needs no login.
          echo "BYPASS_AUTH=true" >> "$GITHUB_ENV"

      - name: Build
        run: npm run build

      - name: Run end-to-end tests
        run: npx playwright test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
