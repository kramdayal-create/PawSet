name: End-to-end tests

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  # Public project URL + anon key (anon is unused in demo/bypass mode).
  NEXT_PUBLIC_SUPABASE_URL: https://jjgutfdwsjjqvksjqtup.supabase.co
  NEXT_PUBLIC_SUPABASE_ANON_KEY: e2e-anon-unused-in-bypass
  # Service-role key drives the demo-mode DB and the cleanup teardown.
  SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY || secrets.PAWSET }}
  # Force demo mode so the journey needs no login.
  BYPASS_AUTH: "true"

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          # Node 22+ ships native WebSocket, which @supabase/realtime-js needs
          # when the teardown client is constructed.
          node-version: 22
          cache: npm

      - name: Check service-role key
        run: |
          if [ -z "$SUPABASE_SERVICE_ROLE_KEY" ]; then
            echo "::error::SUPABASE_SERVICE_ROLE_KEY secret is not set — needed for the live-database E2E run."
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Build
        run: npm run build

      - name: Run end-to-end tests
        run: npx playwright test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
